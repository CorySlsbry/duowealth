name: Deploy to Play Store — DuoWealth

# Triggered by Jarvis admin 'Deploy to Play Store' button via
# workflow_dispatch. Also runnable manually from the Actions tab
# for the operator who wants a one-off store push.
#
# Default track is 'internal' so a mis-click can't accidentally ship
# to production — the operator must explicitly pick 'production' in
# the admin UI or the Actions workflow dialog.

on:
  workflow_dispatch:
    inputs:
      track:
        description: Play Store track (internal | alpha | beta | production)
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_notes:
        description: Release notes for this build
        required: false
        default: Automated build from Jarvis
        type: string
      vertical_slug:
        description: Vertical slug (forwarded by Jarvis)
        required: false
        default: duowealth
        type: string

concurrency:
  # Never run two Play Store deploys for the same vertical at once.
  group: play-store-${{ github.event.inputs.vertical_slug || 'duowealth' }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Bubblewrap build + Play Console upload
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_FILE }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_FILE secret is not set"
            exit 1
          fi
          mkdir -p .bubblewrap
          echo "$KEYSTORE_B64" | base64 -d > .bubblewrap/android.keystore

      - name: Decode Play service account
        env:
          SA_B64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$SA_B64" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is not set"
            exit 1
          fi
          echo "$SA_B64" | base64 -d > play-service-account.json

      - name: Initialize Bubblewrap project
        run: |
          if [ ! -f twa-manifest.json ]; then
            echo "::error::twa-manifest.json is missing — regenerate the vertical through the Jarvis repo-customizer"
            exit 1
          fi
          bubblewrap init --manifest=./twa-manifest.json --directory=./twa-build --skipPwaValidation

      - name: Build signed .aab
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd twa-build
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=../.bubblewrap/android.keystore \
            --signingKeyAlias="$KEY_ALIAS"
          ls -la app-release-bundle.aab || (echo "::error::Bubblewrap did not produce app-release-bundle.aab"; exit 1)

      - name: Upload .aab to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-service-account.json
          packageName: ${{ secrets.PLAY_STORE_PACKAGE_NAME }}
          releaseFiles: twa-build/app-release-bundle.aab
          track: ${{ github.event.inputs.track }}
          status: completed
          whatsNewDirectory: ./play-store/whatsnew
          inAppUpdatePriority: 2

      - name: Upload .aab as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duowealth-app-bundle
          path: twa-build/app-release-bundle.aab
          if-no-files-found: warn
          retention-days: 14
